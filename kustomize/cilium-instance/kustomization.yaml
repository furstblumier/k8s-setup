apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gateway.yaml
  - external-gateway.yaml
  - pool.yaml
  - l2policy.yaml

helmCharts:
- name: cilium
  repo: https://helm.cilium.io/
  version: 1.19.6
  valuesFile: values.yaml
  includeCRDs: true
  releaseName: cilium
  namespace: kube-system
