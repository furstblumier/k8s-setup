apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default-gateway
  namespace: gateway
  annotations:
    cert-manager.io/cluster-issuer: cf-issuer
spec:
  addresses:
    - type: IPAddress
      value: 192.168.208.17
  infrastructure:
    annotations:
      lbipam.cilium.io/sharing-key: "default"
      lbipam.cilium.io/sharing-cross-namespace: "*"
  gatewayClassName: cilium
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      name: http-gw
      port: 80
      protocol: HTTP
    - allowedRoutes:
        namespaces:
          from: All
      hostname: "*.gw.furst.blue"
      name: https-gw
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''	
            kind: Secret
            name: star-gw-furst-blue-tls

